<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes — Junior Substratos</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .cli-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }
    .form-panel { position: sticky; top: calc(var(--topbar-h) + 20px); }
    .form-panel-head {
      background: linear-gradient(135deg, var(--moss-900) 0%, var(--moss-700) 100%);
      padding: 22px 22px 18px;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      position: relative; overflow: hidden;
    }
    .form-panel-head::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 18px 18px;
    }
    .form-panel-head-eyebrow {
      font-size: 10px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--moss-300);
      margin-bottom: 5px; position: relative; z-index: 1;
    }
    .form-panel-head-title {
      font-family: var(--font-display); font-size: 20px; color: #fff;
      line-height: 1.2; position: relative; z-index: 1;
    }
    .form-panel-head-title em { color: var(--moss-300); font-style: italic; }
    .form-panel-body {
      background: var(--white);
      border: 1px solid var(--cream-dark); border-top: none;
      border-radius: 0 0 var(--r-lg) var(--r-lg);
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
    }
    .form-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--moss-600);
      display: flex; align-items: center; gap: 7px;
      padding-bottom: 8px; border-bottom: 1.5px solid var(--moss-100);
      margin-bottom: 2px;
    }
    .form-section-label svg { width: 12px; height: 12px; }
    .form-actions { display: flex; gap: 10px; padding-top: 4px; }
    .form-actions .btn { flex: 1; justify-content: center; }

    /* Modo edição */
    .form-panel.editing .form-panel-head {
      background: linear-gradient(135deg, var(--earth-700) 0%, var(--earth-500) 100%);
    }
    .form-panel.editing .form-panel-head-eyebrow { color: var(--earth-100); }
    .form-panel.editing .form-section-label { color: var(--earth-700); border-color: var(--earth-100); }

    /* Lista */
    .list-toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 18px; background: var(--parchment);
      border-bottom: 1px solid var(--cream-mid); flex-wrap: wrap;
    }
    .list-count {
      font-size: 11px; font-weight: 600; color: var(--ink-light);
      background: var(--cream-mid); padding: 3px 10px;
      border-radius: var(--r-full); white-space: nowrap; margin-left: auto;
    }

    .client-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 18px; border-bottom: 1px solid var(--cream-mid);
      transition: background var(--trans); cursor: default;
    }
    .client-row:last-child { border-bottom: none; }
    .client-row:hover { background: var(--moss-50); }

    .client-avatar {
      width: 40px; height: 40px; border-radius: var(--r-md);
      background: var(--moss-100); border: 1.5px solid var(--moss-200);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 16px; color: var(--moss-700);
      flex-shrink: 0; text-transform: uppercase;
    }
    .client-info { flex: 1; min-width: 0; }
    .client-name {
      font-size: 13.5px; font-weight: 600; color: var(--ink-soft);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .client-details {
      display: flex; gap: 14px; margin-top: 3px; flex-wrap: wrap;
    }
    .client-detail {
      display: flex; align-items: center; gap: 4px;
      font-size: 11.5px; color: var(--ink-faint);
    }
    .client-detail svg { width: 11px; height: 11px; flex-shrink: 0; }
    .client-doc {
      font-size: 11px; font-weight: 600; color: var(--ink-light);
      background: var(--cream-mid); padding: 2px 8px;
      border-radius: var(--r-full); white-space: nowrap; flex-shrink: 0;
    }
    .client-actions { display: flex; gap: 5px; flex-shrink: 0; }

    .empty-list {
      padding: 56px 24px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .empty-list-icon {
      width: 68px; height: 68px; border-radius: 50%;
      background: var(--moss-50); border: 2px solid var(--moss-100);
      display: flex; align-items: center; justify-content: center;
    }
    .empty-list-icon svg { width: 28px; height: 28px; stroke: var(--moss-400); }
    .empty-list h3 { font-family: var(--font-display); font-size: 19px; color: var(--ink-soft); }
    .empty-list p { font-size: 13px; color: var(--ink-faint); max-width: 240px; line-height: 1.6; }

    @media (max-width: 1050px) {
      .cli-layout { grid-template-columns: 1fr; }
      .form-panel { position: static; }
    }
  </style>
</head>
<body>
<script src="utils.js"></script>
<script src="sidebar.js"></script>
<script>requireAuth(); renderSidebar('clientes.html');</script>

<div class="admin-layout">
  <div class="admin-content">

    <header class="topbar">
      <button id="menu-btn" class="topbar-menu-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <span class="topbar-title">Junior Substratos</span>
      <div class="topbar-right">
        <span class="topbar-clock" id="clock">00:00:00</span>
        <div class="topbar-user">
          <div class="topbar-avatar" id="topbar-avatar">U</div>
          <span id="topbar-user-name"></span>
        </div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-heading">Clientes</h1>
          <p class="page-sub">Cadastre e gerencie os clientes da empresa.</p>
        </div>
      </div>

      <div class="cli-layout">

        <!-- ── Formulário ── -->
        <div class="form-panel" id="form-panel">
          <div class="form-panel-head">
            <p class="form-panel-head-eyebrow" id="form-eyebrow">Novo registro</p>
            <h2 class="form-panel-head-title" id="form-title">Cadastrar<br><em>novo cliente</em></h2>
          </div>
          <div class="form-panel-body">

            <div>
              <p class="form-section-label">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="7" r="4"/><path d="M2 18c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                Identificação
              </p>
              <div style="display:flex;flex-direction:column;gap:11px;margin-top:10px">
                <div class="field">
                  <label class="field-label" for="f-nome">Nome / Razão Social <span class="req">*</span></label>
                  <input class="field-input" type="text" id="f-nome" placeholder="Nome completo ou razão social" />
                  <span class="field-error" id="err-nome"></span>
                </div>
                <div class="field">
                  <label class="field-label" for="f-cpfcnpj">CPF / CNPJ</label>
                  <input class="field-input" type="text" id="f-cpfcnpj" placeholder="000.000.000-00" maxlength="18" />
                </div>
              </div>
            </div>

            <div style="height:1px;background:var(--cream-mid)"></div>

            <div>
              <p class="form-section-label">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h12l2 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6l2-2z"/><polyline points="22,6 12,13 2,6" transform="scale(0.7) translate(4,3)"/></svg>
                Contato
              </p>
              <div style="display:flex;flex-direction:column;gap:11px;margin-top:10px">
                <div class="field">
                  <label class="field-label" for="f-tel">Telefone</label>
                  <input class="field-input" type="text" id="f-tel" placeholder="(00) 00000-0000" maxlength="15" />
                </div>
                <div class="field">
                  <label class="field-label" for="f-email">E-mail</label>
                  <input class="field-input" type="email" id="f-email" placeholder="cliente@email.com" />
                </div>
              </div>
            </div>

            <div style="height:1px;background:var(--cream-mid)"></div>

            <div>
              <p class="form-section-label">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 2C6.69 2 4 4.69 4 8c0 5 6 10 6 10s6-5 6-10c0-3.31-2.69-6-6-6z"/><circle cx="10" cy="8" r="2"/></svg>
                Localização
              </p>
              <div style="display:flex;flex-direction:column;gap:11px;margin-top:10px">
                <div class="field">
                  <label class="field-label" for="f-end">Endereço</label>
                  <input class="field-input" type="text" id="f-end" placeholder="Rua, número, bairro" />
                </div>
                <div class="field-row">
                  <div class="field">
                    <label class="field-label" for="f-cidade">Cidade</label>
                    <input class="field-input" type="text" id="f-cidade" placeholder="Cidade" />
                  </div>
                  <div class="field" style="max-width:80px">
                    <label class="field-label" for="f-uf">UF</label>
                    <input class="field-input" type="text" id="f-uf" placeholder="UF" maxlength="2" style="text-transform:uppercase" />
                  </div>
                </div>
              </div>
            </div>

            <input type="hidden" id="edit-id" />

            <div class="form-actions">
              <button class="btn btn-ghost" id="btn-cancelar" style="display:none">Cancelar</button>
              <button class="btn btn-primary" id="btn-salvar">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-6H7v6M7 3H3v18h14V7l-4-4z"/><path d="M11 3v4h4"/></svg>
                Salvar Cliente
              </button>
            </div>
          </div>
        </div>

        <!-- ── Lista ── -->
        <div class="card" id="list-panel">
          <div class="list-toolbar">
            <div class="search-wrap" style="flex:1;min-width:160px">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/></svg>
              <input class="search-input" type="text" id="search" placeholder="Buscar por nome…" style="width:100%" />
            </div>
            <span class="list-count" id="list-count">0 clientes</span>
          </div>
          <div id="list-body"></div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Modal exclusão -->
<div class="modal-overlay" id="modal-del">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Confirmar exclusão</span>
      <button class="modal-close" id="modal-del-close">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5L5 15M5 5l10 10"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--ink-mid);line-height:1.6">Tem certeza que deseja excluir o cliente <strong id="del-nome" style="color:var(--ink-soft)"></strong>? Esta ação não pode ser desfeita.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="modal-del-cancel">Cancelar</button>
      <button class="btn btn-danger" id="modal-del-confirm">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h14M8 6V4h4v2M19 6l-1 12a2 2 0 01-2 2H4a2 2 0 01-2-2L1 6"/></svg>
        Excluir
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
(function () {
  requireAuth();
  startClock('clock');
  initSidebar();

  let deletingId = null;
  let allClientes = [];

  // Máscaras
  document.getElementById('f-cpfcnpj').addEventListener('input', function () { this.value = maskCpfCnpj(this.value); });
  document.getElementById('f-tel').addEventListener('input', function () { this.value = maskPhone(this.value); });
  document.getElementById('f-uf').addEventListener('input', function () { this.value = this.value.toUpperCase(); });

  // ── Renderizar lista ──
  function renderList(q) {
    q = (q || '').toLowerCase();
    const filtered = allClientes.filter(c => !q || c.nome.toLowerCase().includes(q));
    const body = document.getElementById('list-body');
    const count = document.getElementById('list-count');
    count.textContent = filtered.length + ' cliente' + (filtered.length !== 1 ? 's' : '');

    if (!filtered.length) {
      body.innerHTML = `
        <div class="empty-list">
          <div class="empty-list-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a7 7 0 0114 0v2"/><path d="M16 11l2 2 4-4"/></svg>
          </div>
          <h3>${q ? 'Nenhum resultado' : 'Nenhum cliente ainda'}</h3>
          <p>${q ? 'Tente outro termo de busca.' : 'Preencha o formulário ao lado para cadastrar o primeiro cliente.'}</p>
        </div>`;
      return;
    }

    body.innerHTML = filtered.map(c => {
      const ini = c.nome.trim().charAt(0).toUpperCase();
      const cidade = [c.cidade, c.uf].filter(Boolean).join(' - ');
      return `
        <div class="client-row">
          <div class="client-avatar">${ini}</div>
          <div class="client-info">
            <div class="client-name">${esc(c.nome)}</div>
            <div class="client-details">
              ${c.tel ? `<span class="client-detail"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5a2 2 0 012-2h2.5l1 4-1.5 1.5a11 11 0 005 5L13.5 12l4 1V15a2 2 0 01-2 2C7.16 17 3 12.84 3 8V5z"/></svg>${esc(c.tel)}</span>` : ''}
              ${c.email ? `<span class="client-detail"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h12l2 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6l2-2z"/><polyline points="22,6 12,13 2,6" transform="scale(0.65) translate(4.6,3.5)"/></svg>${esc(c.email)}</span>` : ''}
              ${cidade ? `<span class="client-detail"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 2C6.69 2 4 4.69 4 8c0 5 6 10 6 10s6-5 6-10c0-3.31-2.69-6-6-6z"/><circle cx="10" cy="8" r="2"/></svg>${esc(cidade)}</span>` : ''}
            </div>
          </div>
          ${c.cpfcnpj ? `<span class="client-doc">${esc(c.cpfcnpj)}</span>` : ''}
          <div class="client-actions">
            <button class="btn btn-ghost btn-sm" data-edit="${c.id}" title="Editar">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 3H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-6"/><path d="M17 1l2 2-9 9H8v-2L17 1z"/></svg>
              Editar
            </button>
            <button class="btn-icon danger" data-del="${c.id}" title="Excluir">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h14M8 6V4h4v2M19 6l-1 12a2 2 0 01-2 2H4a2 2 0 01-2-2L1 6"/></svg>
            </button>
          </div>
        </div>`;
    }).join('');

    body.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => editCliente(b.dataset.edit)));
    body.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => confirmDel(b.dataset.del)));
  }

  // ── Editar ──
  function editCliente(id) {
    const c = getClientes().find(x => x.id === id);
    if (!c) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('f-nome').value    = c.nome || '';
    document.getElementById('f-cpfcnpj').value = c.cpfcnpj || '';
    document.getElementById('f-tel').value     = c.tel || '';
    document.getElementById('f-email').value   = c.email || '';
    document.getElementById('f-end').value     = c.endereco || '';
    document.getElementById('f-cidade').value  = c.cidade || '';
    document.getElementById('f-uf').value      = c.uf || '';

    document.getElementById('form-eyebrow').textContent   = 'Editando registro';
    document.getElementById('form-title').innerHTML       = 'Editar<br><em>cliente</em>';
    document.getElementById('btn-cancelar').style.display = '';
    document.getElementById('form-panel').classList.add('editing');
    document.getElementById('f-nome').focus();
    document.getElementById('form-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Reset ──
  function resetForm() {
    document.getElementById('edit-id').value = '';
    ['f-nome','f-cpfcnpj','f-tel','f-email','f-end','f-cidade','f-uf'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.value = ''; el.classList.remove('error'); }
    });
    const errNome = document.getElementById('err-nome');
    if (errNome) { errNome.textContent = ''; errNome.classList.remove('visible'); }
    document.getElementById('form-eyebrow').textContent   = 'Novo registro';
    document.getElementById('form-title').innerHTML       = 'Cadastrar<br><em>novo cliente</em>';
    document.getElementById('btn-cancelar').style.display = 'none';
    document.getElementById('form-panel').classList.remove('editing');
  }

  document.getElementById('btn-cancelar').addEventListener('click', resetForm);

  // ── Salvar ──
  document.getElementById('btn-salvar').addEventListener('click', function () {
    const nome = document.getElementById('f-nome').value.trim();
    const errEl = document.getElementById('err-nome');
    errEl.textContent = ''; errEl.classList.remove('visible');
    document.getElementById('f-nome').classList.remove('error');

    if (!nome) {
      errEl.textContent = 'Informe o nome ou razão social';
      errEl.classList.add('visible');
      document.getElementById('f-nome').classList.add('error');
      return;
    }

    const editId = document.getElementById('edit-id').value;
    const clientes = getClientes();
    const data = {
      id:       editId || uid(),
      nome,
      cpfcnpj:  document.getElementById('f-cpfcnpj').value.trim(),
      tel:      document.getElementById('f-tel').value.trim(),
      email:    document.getElementById('f-email').value.trim(),
      endereco: document.getElementById('f-end').value.trim(),
      cidade:   document.getElementById('f-cidade').value.trim(),
      uf:       document.getElementById('f-uf').value.trim(),
      criadoEm: editId ? (clientes.find(c => c.id === editId)?.criadoEm || Date.now()) : Date.now(),
    };

    if (editId) {
      const idx = clientes.findIndex(c => c.id === editId);
      if (idx > -1) clientes[idx] = data; else clientes.push(data);
      toast('Cliente atualizado!', 'ok');
    } else {
      clientes.push(data);
      toast('Cliente salvo com sucesso!', 'ok');
    }

    // Salva no Firestore
    document.getElementById('btn-salvar').disabled = true;
    dbSaveCliente(data).then(() => {
      if (editId) { toast('Cliente atualizado!', 'ok'); }
      else { toast('Cliente salvo!', 'ok'); }
      document.getElementById('btn-salvar').disabled = false;
      resetForm();
      loadAndRender();
    });
  });

  // ── Excluir ──
  function confirmDel(id) {
    const c = getClientes().find(x => x.id === id);
    if (!c) return;
    deletingId = id;
    document.getElementById('del-nome').textContent = c.nome;
    document.getElementById('modal-del').classList.add('open');
  }

  document.getElementById('modal-del-close').addEventListener('click', () => document.getElementById('modal-del').classList.remove('open'));
  document.getElementById('modal-del-cancel').addEventListener('click', () => document.getElementById('modal-del').classList.remove('open'));
  document.getElementById('modal-del-confirm').addEventListener('click', function () {
    if (!deletingId) return;
    dbDeleteCliente(deletingId).then(() => {
      deletingId = null;
      document.getElementById('modal-del').classList.remove('open');
      toast('Cliente excluído.', 'info');
      loadAndRender();
    });
  });

  // ── Busca ──
  document.getElementById('search').addEventListener('input', function () { renderList(this.value); });

  // ── Carrega do Firestore e renderiza ──
  async function loadAndRender() {
    document.getElementById('list-body').innerHTML = '<div style="padding:32px;text-align:center;color:var(--ink-faint)">Carregando...</div>';
    allClientes = await dbGetClientes();
    renderList(document.getElementById('search').value);
  }

  loadAndRender();
})();
</script>
<script>
</script>
<script>
  (function() {
    const sidebar = document.querySelector('.sidebar');
    const menuBtn = document.getElementById('menu-btn');
    if (!sidebar || !menuBtn) return;
    const overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);
    menuBtn.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
      });
    });
  })();
</script>
</body>
</html>
